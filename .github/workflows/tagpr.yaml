name: Tagpr

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}

jobs:
  tagpr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check configuration
        id: config
        shell: bash
        env:
          TAGPR_APP_ID: ${{ secrets.APP_ID }}
          TAGPR_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$TAGPR_APP_ID" && -n "$TAGPR_APP_PRIVATE_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when GitHub App secrets are not configured
        if: ${{ steps.config.outputs.enabled != 'true' }}
        run: echo "Skipping Tagpr because APP_ID / APP_PRIVATE_KEY are not configured."

      - name: Generate token
        if: ${{ steps.config.outputs.enabled == 'true' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Run tagpr
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
