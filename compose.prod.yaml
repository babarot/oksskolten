services:
  server:
    # Option A: Build locally (default)
    build:
      target: runtime
    # Option B: Use pre-built image from GHCR (comment out "build" above and uncomment below)
    # image: ghcr.io/babarot/oksskolten:latest
    command: []
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes: !override
      - ${DATA_DIR:-./data}:/data
    ports: !override
      - "3000:3000"
    depends_on: !override
      rss-bridge:
        condition: service_started
      meilisearch:
        condition: service_healthy

  meilisearch:
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports: !override []

  rss-bridge:
    ports: !override []

  flaresolverr:
    profiles: [flaresolverr]
    ports: !override []

  frontend:
    deploy:
      replicas: 0
